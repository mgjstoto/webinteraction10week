	<script>
	    window.addEventListener('scroll', () => {
	        const elements = document.querySelectorAll('.scroll-motion');
	        elements.forEach(el => {
	            const rect = el.getBoundingClientRect();
	            if (rect.top < window.innerHeight * 0.8) {
	                el.classList.add('active');
	            }
	        });
	    });
	</script>

        }
    });
});
